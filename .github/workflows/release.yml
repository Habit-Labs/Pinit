name: Release

# Builds the plugin in CI and publishes a GitHub release with build-provenance
# attestations, so users can cryptographically verify the assets were built from
# this source. Triggered by pushing a version tag (e.g. 1.0.0 — no "v" prefix,
# matching manifest.json and Obsidian's release convention).
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write # create the release
  id-token: write # OIDC token for attestation provenance
  attestations: write # record the attestations

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            main.js manifest.json styles.css \
            --title "$TAG" \
            --generate-notes
